services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clarity
      POSTGRES_USER: clarity
      POSTGRES_PASSWORD: clarity
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.production
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://clarity:clarity@db:5432/clarity
    depends_on:
      - db
    volumes:
      - backend_storage:/app/storage
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.production
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  backend_storage:
